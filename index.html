<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible"
        content="IE=edge">
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet"
        href="styles.css">

  <title>Projeto</title>
</head>

<body>
  <!-- Cabeçalho de informações do sistema -->
  <header>
    <div class="title">
      <h1>Lista de Compras</h1>
    </div>
    <div class="banner">
      <img src="https://images.contentstack.io/v3/assets/blt45c082eaf9747747/bltbcca43584b660977/5de0b6aa703bd50385f981ad/Header-5.jpg?width=1200&height=630&fit=crop"
           alt="y">
    </div>
  </header>

  <!-- Opções para adicionar um novo item -->
  <section class="newItem">
    <input type="text"
           id="newInput"
           placeholder="Adicionar novo item:">
    <input type="text"
           id="newRating"
           placeholder="Nota:">
    <input type="text"
           id="newPlatform"
           placeholder="Plataforma:">
    <input type="text"
           id="newFinished"
           placeholder="Zerado:">
    <button onclick="newItem()"
            class="addBtn">Adicionar</button>
  </section>

  <!-- Filtros da tabela -->
  <section class="filters">
    <input type="text" id="searchInput" placeholder="Buscar por nome...">
    <select id="filterPlatform">
      <option value="">Todas as plataformas</option>
    </select>
    <select id="filterZerado">
      <option value="">Todos</option>
      <option value="true">Zerado</option>
      <option value="false">Não zerado</option>
    </select>
  </section>

  <!-- Tabela com items existentes -->
  <section class="items">
    <table id="myTable">
      <tr>
        <th onclick="sortTable('nome')">Nome <span class="sort-arrow" id="arrow-nome"></span></th>
        <th onclick="sortTable('nota')">Nota <span class="sort-arrow" id="arrow-nota"></span></th>
        <th onclick="sortTable('plataforma')">Plataforma <span class="sort-arrow" id="arrow-plataforma"></span></th>
        <th onclick="sortTable('zerado')">Zerado <span class="sort-arrow" id="arrow-zerado"></span></th>
        <th><img src="https://cdn-icons-png.flaticon.com/512/126/126468.png"
               width="15px"
               height="15px"></th>
      </tr>
    </table>
  </section>

  <script src="scripts.js"></script>
</body>

</html>
